<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>🌸 Happy Mother's Day! 🌸</h1>
        <p class="subtitle">A little garden made just for you.</p>

        <!-- Buttons Row -->
        <div class="button-row">
            <button onclick="growFlower()">Grow a Flower</button>
            <button onclick="addCat()">Add a Cat</button>
            <button onclick="addDog()">Add a Dog</button>
            <button onclick="toggleMusic()">Play / Pause Music</button>
        </div>

        <!-- Garden Area -->
        <div id="garden"></div>

        <!-- Music -->
        <audio id="song" src="your-song.mp3"></audio>
        <!-- Replace with your own file or embed Spotify -->

        <p class="footer">Made with love from: Logan & Gloria 💖</p>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌿 Happy Mother's Day, Mom 🌿</h1>
    <p class="subtitle">A soft little cottage garden made just for you.</p>

    <div class="button-row">
        <button onclick="addFloatingFlower()">Add Floating Flower 🌸</button>
        <button onclick="addFloatingButterfly()">Add Butterfly 🦋</button>
        <button onclick="addSparkles()">Add Sparkles ✨</button>
        <button onclick="addPet()">Add a Wandering Pet 🐾</button>
        <button onclick="showMessage()">Show Message 💌</button>
    </div>

    <div id="garden"></div>

    <!-- Your song -->
    <audio id="song" src="moms-song.mp3" controls></audio>

    <script src="script.js"></script>
</body>
</html>
